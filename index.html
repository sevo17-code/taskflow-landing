<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow landing entry page for GitHub Pages.">
  <title>TaskFlow Landing</title>
  <meta http-equiv="refresh" content="0; url=./TaskFlow-landing.html">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --panel: rgba(15, 23, 42, 0.82);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 24%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.16), transparent 22%),
        linear-gradient(180deg, #020617 0%, var(--bg) 100%);
    }

    .card {
      width: min(100%, 680px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1;
    }

    p {
      margin: 16px auto 0;
      max-width: 48ch;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    a {
      text-decoration: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-weight: 700;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.45);
    }

    .btn-primary {
      color: #03131c;
      background: linear-gradient(135deg, var(--accent), #7dd3fc);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">TaskFlow</p>
    <h1>Opening your site...</h1>
    <p>
      If the redirect does not happen automatically, use one of the buttons below.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="./TaskFlow-landing.html">Open Static Site</a>
      <a class="btn btn-secondary" href="https://github.com/sevo17-code/taskflow-landing">Open GitHub Repo</a>
    </div>
    <div class="note">GitHub Pages now has a real homepage instead of rendering the README.</div>
  </main>
</body>
</html>
